<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced — Python for AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="/Python-for-AI/assets/css/main.css"/>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="section-page">
  <div class="section-hero section-hero-advanced">
    <div class="section-hero-inner">
      <span class="section-badge badge-advanced"><i class="fas fa-rocket"></i> Advanced</span>
      <h1>Advanced Python for AI</h1>
      <p>Build production AI apps — CLI chatbots, RAG systems, Flask APIs, Streamlit dashboards, data pipelines, and your capstone project.</p>
      <div class="section-hero-meta">
        <span><i class="fas fa-layer-group"></i> 6 Sessions</span>
        <span><i class="fas fa-clock"></i> ~4 hours</span>
        <span><i class="fas fa-flask"></i> 6 Labs</span>
      </div>
    </div>
  </div>
  <div class="section-grid-wrapper">
    <div class="session-grid" id="session-grid">
      <p id="loading-msg" style="color:#78716c;grid-column:1/-1;">Loading sessions…</p>
    </div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="/Python-for-AI/assets/js/progress.js"></script>
<script src="/Python-for-AI/assets/js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  fetch('/Python-for-AI/data/sessions.json')
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(data => {
      const sec = data.sections.find(s => s.id === 'advanced');
      if (!sec) return;
      const grid = document.getElementById('session-grid');
      const p = Progress.getAllProgress();
      let html = '';
      sec.sessions.forEach(s => {
        const done = p.sessions?.[s.id]?.quizPassed;
        html += `<a href="${s.path}" class="session-card${done?' completed':''}">
          <div class="session-card-badge badge-advanced"><i class="fas fa-rocket"></i> Advanced</div>
          <h3 style="font-size:.95rem;font-weight:600;line-height:1.35;margin:.25rem 0;">${s.title}</h3>
          <div class="session-card-meta">
            <span><i class="fas fa-clock"></i> ${s.duration}</span>
            ${done ? '<span class="done-badge"><i class="fas fa-check-circle"></i> Done</span>' : ''}
          </div>
        </a>`;
      });
      grid.innerHTML = html;
    })
    .catch(e => {
      document.getElementById('loading-msg').textContent = 'Could not load sessions. Try refreshing.';
      console.error('sessions.json fetch failed:', e);
    });
});
</script>
</body>
</html>
